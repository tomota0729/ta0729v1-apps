<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QRコード</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Maru Gothic Pro', 'BIZ UDPGothic', 'Noto Sans JP', sans-serif;
      background: linear-gradient(135deg, #FFF9C4 0%, #FFDDE1 50%, #C8F0FF 100%);
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 20px;
    }
    .back-btn {
      align-self: flex-start;
      background: white; border: none; border-radius: 50%;
      width: 48px; height: 48px; font-size: 1.4rem;
      cursor: pointer; box-shadow: 0 3px 10px rgba(0,0,0,0.12);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 24px;
    }
    h1 { font-size: 1.8rem; color: #E54B4B; text-shadow: 2px 2px 0 #FFB3B3; margin-bottom: 8px; }
    .subtitle { color: #888; margin-bottom: 32px; font-size: 0.95rem; }
    .card {
      background: white; border-radius: 24px;
      padding: 28px; box-shadow: 0 8px 28px rgba(0,0,0,0.12);
      display: flex; flex-direction: column; align-items: center;
      gap: 20px; width: 100%; max-width: 420px;
    }
    #qrCanvas { border-radius: 8px; }
    .url-display {
      background: #f5f5f5; border-radius: 10px;
      padding: 10px 16px; font-size: 0.85rem;
      word-break: break-all; text-align: center;
      color: #555; width: 100%;
    }
    .input-area {
      width: 100%;
      display: flex; flex-direction: column; gap: 10px;
    }
    .input-area label { font-size: 0.9rem; color: #666; font-weight: bold; }
    .input-area input {
      width: 100%; padding: 12px 14px;
      border: 2px solid #ddd; border-radius: 12px;
      font-size: 0.95rem; outline: none;
    }
    .input-area input:focus { border-color: #FF8C69; }
    .btn-row { display: flex; gap: 10px; width: 100%; }
    .btn {
      flex: 1; padding: 14px; border: none; border-radius: 14px;
      font-size: 1rem; font-weight: bold; cursor: pointer;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
      transition: transform 0.1s;
    }
    .btn:active { transform: scale(0.96); }
    .btn-primary { background: #FF8C69; color: white; }
    .btn-secondary { background: white; color: #555; border: 2px solid #ddd; }
    .copied-msg {
      font-size: 0.85rem; color: #4CAF50; font-weight: bold;
      opacity: 0; transition: opacity 0.3s;
    }
    .copied-msg.show { opacity: 1; }
  </style>
</head>
<body>
  <button class="back-btn" onclick="location.href='./'">🏠</button>
  <h1>📱 QRコード</h1>
  <p class="subtitle">スマホで読みこんでアクセスしよう</p>

  <div class="card">
    <div id="qrContainer" style="display:flex;align-items:center;justify-content:center;"></div>
    <div class="url-display" id="urlDisplay">―</div>

    <div class="input-area">
      <label>URLを入力（GitHub PagesのURLなど）</label>
      <input type="url" id="urlInput" placeholder="https://username.github.io/kodomo-apps/">
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="generateQR()">QR生成</button>
      <button class="btn btn-secondary" onclick="copyUrl()">コピー</button>
    </div>
    <div class="copied-msg" id="copiedMsg">コピーしました！</div>
  </div>

  <!-- QRコード生成ライブラリ（CDN） -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script>
    // デフォルトURLはトップページ
    const defaultUrl = window.location.href.replace('qrcode.html', '').replace(/\/$/, '') + '/';
    document.getElementById('urlInput').value = defaultUrl;

    function generateQR() {
      const url = document.getElementById('urlInput').value.trim();
      if (!url) return;

      const container = document.getElementById('qrContainer');
      container.innerHTML = '';  // 前のQRを消去

      const size = Math.min(window.innerWidth - 80, 280);
      new QRCode(container, {
        text: url,
        width: size,
        height: size,
        colorDark: '#222222',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });

      document.getElementById('urlDisplay').textContent = url;
    }

    function copyUrl() {
      const url = document.getElementById('urlInput').value.trim();
      if (!url) return;
      navigator.clipboard.writeText(url).then(() => {
        const msg = document.getElementById('copiedMsg');
        msg.classList.add('show');
        setTimeout(() => msg.classList.remove('show'), 2000);
      });
    }

    // 初期生成
    generateQR();
  </script>
</body>
</html>
