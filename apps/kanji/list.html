<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>漢字一覧（デバッグ）</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Maru Gothic Pro', 'BIZ UDPGothic', sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    h1 { font-size: 1.4rem; margin-bottom: 16px; color: #333; }
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .tab {
      padding: 8px 18px; border: none; border-radius: 20px;
      background: #ddd; cursor: pointer; font-size: 0.95rem;
    }
    .tab.active { background: #FF8C69; color: white; font-weight: bold; }
    .tab.disabled { opacity: 0.4; cursor: not-allowed; }
    .tab.font-tab { background: #ddd; }
    .tab.font-tab.active { background: #9C27B0; color: white; }
    .stats { margin-bottom: 12px; color: #666; font-size: 0.9rem; }

    /* --- 通常一覧 --- */
    #section-list table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    th { background: #FF8C69; color: white; padding: 10px 14px; text-align: left; font-size: 0.9rem; }
    td { padding: 10px 14px; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fff8f5; }
    .kanji-cell { font-size: 1.8rem; text-align: center; width: 60px; }
    .on-badge {
      display: inline-block; background: #FFE0B2; color: #E65100;
      border-radius: 4px; padding: 1px 6px; font-size: 0.8rem; font-weight: bold;
      margin-right: 4px;
    }
    .kun-badge {
      display: inline-block; background: #E3F2FD; color: #1565C0;
      border-radius: 4px; padding: 1px 6px; font-size: 0.8rem; font-weight: bold;
      margin-right: 4px;
    }

    /* --- フォント比較 --- */
    #section-font { display: none; }
    #section-font.active { display: block; }
    #section-list { display: block; }
    #section-list.hidden { display: none; }

    .font-table-wrap { overflow-x: auto; }
    .font-table {
      border-collapse: collapse;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      min-width: 700px;
    }
    .font-table th {
      background: #9C27B0; color: white;
      padding: 10px 12px; font-size: 0.8rem;
      text-align: center; white-space: nowrap;
    }
    .font-table th:first-child { background: #7B1FA2; width: 36px; }
    .font-table td {
      padding: 6px 10px; border-bottom: 1px solid #f0f0f0;
      text-align: center; font-size: 2rem; line-height: 1;
    }
    .font-table tr:last-child td { border-bottom: none; }
    .font-table td:first-child { font-size: 0.75rem; color: #999; }
    .font-table td.f1 { font-family: 'BIZ UDPMincho', serif; }
    .font-table td.f2 { font-family: 'Noto Serif JP', serif; }
    .font-table td.f3 { font-family: 'Yu Mincho', '游明朝', serif; }
    .font-table td.f4 { font-family: 'UD Digi Kyokasho N-R', 'UDデジタル教科書体 N-R', serif; }
    .font-table td.f5 { font-family: 'HGP教科書体', 'HG教科書体', serif; }
    .font-table td.f6 { font-family: serif; }

    .back-link {
      display: inline-block; margin-bottom: 16px;
      color: #FF8C69; text-decoration: none; font-size: 0.95rem;
    }
    .back-link:hover { text-decoration: underline; }

    .font-note {
      margin-bottom: 12px; font-size: 0.8rem; color: #888;
      background: white; border-radius: 8px; padding: 10px 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    @media (max-width: 480px) {
      .kanji-cell { font-size: 1.4rem; width: 46px; }
      td, th { padding: 8px 10px; }
    }
  </style>
</head>
<body>
  <a class="back-link" href="../../">← トップへもどる</a>
  <h1>📋 漢字一覧（デバッグ用）</h1>

  <div class="tabs" id="tabs"></div>
  <div class="stats" id="stats"></div>

  <!-- 通常一覧 -->
  <div id="section-list">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>漢字</th>
          <th>読み</th>
        </tr>
      </thead>
      <tbody id="kanjiTable"></tbody>
    </table>
  </div>

  <!-- フォント比較 -->
  <div id="section-font">
    <div class="font-note">
      ※ 端末にインストールされていないフォントはブラウザの代替フォントで表示されます。
    </div>
    <div class="font-table-wrap">
      <table class="font-table">
        <thead>
          <tr>
            <th>#</th>
            <th>① BIZ UDPMincho</th>
            <th>② Noto Serif JP</th>
            <th>③ 游明朝</th>
            <th>④ UD教科書体</th>
            <th>⑤ HGP教科書体</th>
            <th>⑥ serif標準</th>
          </tr>
        </thead>
        <tbody id="fontTable"></tbody>
      </table>
    </div>
  </div>

  <script src="data.js"></script>
  <script>
    let currentGrade = 1;
    let currentMode = 'list'; // 'list' or 'font'

    function renderTabs() {
      const tabs = document.getElementById('tabs');
      tabs.innerHTML = '';

      // 学年タブ
      Object.entries(GRADE_INFO).forEach(([grade, info]) => {
        const btn = document.createElement('button');
        btn.className = 'tab' +
          (Number(grade) === currentGrade && currentMode === 'list' ? ' active' : '') +
          (!info.available ? ' disabled' : '');
        btn.textContent = info.label;
        if (info.available) btn.addEventListener('click', () => {
          currentGrade = Number(grade);
          currentMode = 'list';
          renderTabs();
          renderTable();
          showSection('list');
        });
        tabs.appendChild(btn);
      });

      // フォント比較タブ
      const fontBtn = document.createElement('button');
      fontBtn.className = 'tab font-tab' + (currentMode === 'font' ? ' active' : '');
      fontBtn.textContent = '🔤 フォント比較';
      fontBtn.addEventListener('click', () => {
        currentMode = 'font';
        renderTabs();
        renderFontTable();
        showSection('font');
      });
      tabs.appendChild(fontBtn);
    }

    function showSection(mode) {
      const listEl = document.getElementById('section-list');
      const fontEl = document.getElementById('section-font');
      if (mode === 'font') {
        listEl.classList.add('hidden');
        fontEl.classList.add('active');
      } else {
        listEl.classList.remove('hidden');
        fontEl.classList.remove('active');
      }
    }

    function renderTable() {
      const data = KANJI_DATA[currentGrade] || [];
      document.getElementById('stats').textContent = `${currentGrade}年生：${data.length}字`;
      const tbody = document.getElementById('kanjiTable');
      tbody.innerHTML = '';
      data.forEach((item, i) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${i + 1}</td>
          <td class="kanji-cell">${item.kanji}</td>
          <td>
            <span class="on-badge">音</span>${item.on || '―'}
            &nbsp;
            <span class="kun-badge">訓</span>${item.kun || '―'}
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    function renderFontTable() {
      const data = KANJI_DATA[currentGrade] || [];
      document.getElementById('stats').textContent = `${currentGrade}年生：${data.length}字（フォント比較）`;
      const tbody = document.getElementById('fontTable');
      tbody.innerHTML = '';
      data.forEach((item, i) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${i + 1}</td>
          <td class="f1">${item.kanji}</td>
          <td class="f2">${item.kanji}</td>
          <td class="f3">${item.kanji}</td>
          <td class="f4">${item.kanji}</td>
          <td class="f5">${item.kanji}</td>
          <td class="f6">${item.kanji}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    renderTabs();
    renderTable();
  </script>
</body>
</html>
