<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>漢字一覧（デバッグ）</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Maru Gothic Pro', 'BIZ UDPGothic', sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    h1 { font-size: 1.4rem; margin-bottom: 16px; color: #333; }
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .tab {
      padding: 8px 18px; border: none; border-radius: 20px;
      background: #ddd; cursor: pointer; font-size: 0.95rem;
    }
    .tab.active { background: #FF8C69; color: white; font-weight: bold; }
    .tab.disabled { opacity: 0.4; cursor: not-allowed; }
    .stats { margin-bottom: 12px; color: #666; font-size: 0.9rem; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    th { background: #FF8C69; color: white; padding: 10px 14px; text-align: left; font-size: 0.9rem; }
    td { padding: 10px 14px; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fff8f5; }
    .kanji-cell { font-size: 1.8rem; text-align: center; width: 60px; }
    .on-badge {
      display: inline-block; background: #FFE0B2; color: #E65100;
      border-radius: 4px; padding: 1px 6px; font-size: 0.8rem; font-weight: bold;
      margin-right: 4px;
    }
    .kun-badge {
      display: inline-block; background: #E3F2FD; color: #1565C0;
      border-radius: 4px; padding: 1px 6px; font-size: 0.8rem; font-weight: bold;
      margin-right: 4px;
    }
    .back-link {
      display: inline-block; margin-bottom: 16px;
      color: #FF8C69; text-decoration: none; font-size: 0.95rem;
    }
    .back-link:hover { text-decoration: underline; }
    @media (max-width: 480px) {
      .kanji-cell { font-size: 1.4rem; width: 46px; }
      td, th { padding: 8px 10px; }
    }
  </style>
</head>
<body>
  <a class="back-link" href="../../">← トップへもどる</a>
  <h1>📋 漢字一覧（デバッグ用）</h1>

  <div class="tabs" id="tabs"></div>
  <div class="stats" id="stats"></div>
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>漢字</th>
        <th>読み</th>
      </tr>
    </thead>
    <tbody id="kanjiTable"></tbody>
  </table>

  <script src="data.js"></script>
  <script>
    let currentGrade = 1;

    function renderTabs() {
      const tabs = document.getElementById('tabs');
      tabs.innerHTML = '';
      Object.entries(GRADE_INFO).forEach(([grade, info]) => {
        const btn = document.createElement('button');
        btn.className = 'tab' +
          (Number(grade) === currentGrade ? ' active' : '') +
          (!info.available ? ' disabled' : '');
        btn.textContent = info.label;
        if (info.available) btn.addEventListener('click', () => {
          currentGrade = Number(grade);
          renderTabs();
          renderTable();
        });
        tabs.appendChild(btn);
      });
    }

    function renderTable() {
      const data = KANJI_DATA[currentGrade] || [];
      document.getElementById('stats').textContent = `${currentGrade}年生：${data.length}字`;
      const tbody = document.getElementById('kanjiTable');
      tbody.innerHTML = '';
      data.forEach((item, i) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${i + 1}</td>
          <td class="kanji-cell">${item.kanji}</td>
          <td>
            <span class="on-badge">音</span>${item.on || '―'}
            &nbsp;
            <span class="kun-badge">訓</span>${item.kun || '―'}
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    renderTabs();
    renderTable();
  </script>
</body>
</html>
